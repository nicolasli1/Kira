name: ci-cd

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual run reason"
        required: false
        default: "on-demand verification"

jobs:
  terraform-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -no-color

  app-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run unit tests
        run: pytest app/tests -q

  deploy-and-verify:
    runs-on: ubuntu-latest
    needs:
      - terraform-check
      - app-tests
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Show Terraform outputs
        working-directory: terraform
        run: terraform output

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Wait for blockchain health
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8001/health && exit 0
            sleep 2
          done
          exit 1

      - name: Wait for Prometheus health
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9090/-/healthy && exit 0
            sleep 2
          done
          exit 1

      - name: Show runtime status
        run: |
          {
            echo "=== docker ps ==="
            docker ps
            echo
            echo "=== api health ==="
            curl -fsS http://localhost:8000/health
            echo
            echo "=== blockchain health ==="
            curl -fsS http://localhost:8001/health
            echo
            echo "=== prometheus health ==="
            curl -fsS http://localhost:9090/-/healthy
            echo
          } | tee /tmp/runtime-status.txt

      - name: Run deployment tests
        run: chmod +x scripts/post_deploy_test.sh && ./scripts/post_deploy_test.sh

      - name: Validate vendorB pending flow
        run: |
          response="$(curl -fsS -X POST http://localhost:8000/transfer \
            -H "Content-Type: application/json" \
            -d '{"amount":100,"vendor":"vendorB","txhash":"0xabc123confirmed"}')"
          echo "${response}" | grep '"status":"pending"' >/dev/null

      - name: Validate unsupported vendor flow
        run: |
          status_code="$(curl -sS -o /tmp/unsupported-vendor.json -w "%{http_code}" -X POST http://localhost:8000/transfer \
            -H "Content-Type: application/json" \
            -d '{"amount":100,"vendor":"vendorZ","txhash":"0xabc123confirmed"}')"
          test "${status_code}" = "400"
          grep 'Unsupported vendor' /tmp/unsupported-vendor.json >/dev/null

      - name: Validate metrics endpoint
        run: |
          curl -fsS http://localhost:8000/metrics > /tmp/metrics.txt
          grep 'transfer_requests_total' /tmp/metrics.txt >/dev/null
          grep 'vendor_request_latency_seconds' /tmp/metrics.txt >/dev/null
          grep 'txhash_verifications_total' /tmp/metrics.txt >/dev/null

      - name: Collect DORA metrics artifact
        env:
          LEAD_TIME_SECONDS: "derived-in-report"
        run: python scripts/collect_dora_metrics.py

      - name: Upload DORA metrics
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics
          path: dora-metrics.json

      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-evidence
          if-no-files-found: ignore
          path: |
            /tmp/runtime-status.txt
            /tmp/metrics.txt
            /tmp/unsupported-vendor.json

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker logs payments-api || true
          docker logs payments-blockchain || true
          docker logs payments-prometheus || true

      - name: Tear down
        if: always()
        working-directory: terraform
        run: |
          terraform destroy -auto-approve || true
